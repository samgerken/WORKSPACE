<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Dashboard</title>
    <style>
        :root {
            --bg-base: #0b0b0d;
            --bg-surface: rgba(255, 255, 255, 0.01);
            --bg-terminal: #000000;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-active: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e4e4e7;
            --text-muted: #71717a;
            --text-dark: #3f3f3f;
            --accent-alert: #f87171;
            --panel-header-line: #52525b;
            --panel-title-color: #a1a1aa;
            --chat-user-bg: #27272a;
            --chat-gemini-bg: rgba(255, 255, 255, 0.02);
            --chat-gemini-border: rgba(255, 255, 255, 0.04);
            --code-bg: #18181b;
            --pre-bg: #09090b;
            --font-stack: Calibri, Candara, "Segoe UI", Optima, Arial, sans-serif;
            --progress-track: #18181b;
        }

        [data-theme="light"] {
            --bg-base: #f4f4f5;
            --bg-surface: #ffffff;
            --bg-terminal: #fafafa;
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-active: rgba(0, 0, 0, 0.6);
            --text-primary: #09090b;
            --text-secondary: #27272a;
            --text-muted: #71717a;
            --text-dark: #a1a1aa;
            --accent-alert: #dc2626;
            --panel-header-line: #a1a1aa;
            --panel-title-color: #4b5563;
            --chat-user-bg: #e4e4e7;
            --chat-gemini-bg: #f4f4f5;
            --chat-gemini-border: rgba(0, 0, 0, 0.05);
            --code-bg: #e4e4e7;
            --pre-bg: #fafafa;
            --progress-track: #e4e4e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-base); color: var(--text-secondary); font-family: var(--font-stack); padding: 40px 20px; line-height: 1.5; }
        .container { max-width: 1250px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px; }
        h1 { color: var(--text-primary); font-size: 1.7rem; font-weight: 700; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: 2px; }

        .theme-toggle-btn { background: var(--bg-terminal); color: var(--text-secondary); border: 1px solid var(--border-subtle); padding: 6px 12px; font-family: monospace; font-size: 0.75rem; text-transform: uppercase; border-radius: 4px; cursor: pointer; }
        
        .top-row-container { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        section.panel, div.panel { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; display: flex; flex-direction: column; }
        
        h2 { color: var(--panel-title-color); font-size: 0.78rem; font-weight: 700; text-transform: uppercase; border-left: 2px solid var(--panel-header-line); padding-left: 10px; }
        .control-row { display: flex; gap: 12px; margin-top: 16px; margin-bottom: 20px; }
        
        .task-input { flex: 1; background: var(--bg-terminal); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 12px 16px; color: var(--text-primary); font-family: inherit; font-size: 0.95rem; outline: none; }
        .task-input:focus { border-color: var(--border-active); }
        
        .deploy-btn { background: var(--text-primary); color: var(--bg-base); border: none; border-radius: 6px; padding: 0 20px; font-weight: 600; cursor: pointer; }
        .checklist-container { list-style: none; }
        
        .checklist-item { padding: 12px 10px; border-bottom: 1px solid var(--border-subtle); font-size: 0.95rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-radius: 4px; }
        .checklist-item:hover { background: rgba(255, 255, 255, 0.02); }
        .task-left-block { display: flex; align-items: center; }
        .status-box { font-family: monospace; font-weight: bold; color: var(--text-muted); margin-right: 14px; min-width: 28px; }
        
        .clear-single-btn { background: none; border: none; color: var(--text-dark); font-size: 0.8rem; cursor: pointer; }
        .checklist-item:hover .clear-single-btn { color: var(--text-muted); }
        .clear-single-btn:hover { color: var(--accent-alert) !important; }
        
        .resolved { color: var(--text-dark) !important; }
        .resolved .task-text { text-decoration: line-through; }
        
        .metrics-footer { display: flex; justify-content: space-between; margin-top: auto; padding-top: 16px; font-size: 0.85rem; color: var(--text-muted); border-top: 1px dashed var(--border-subtle); }
        .purge-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; text-decoration: underline; font-family: inherit; }

        .ai-chat-log { background: var(--bg-terminal); border: 1px solid var(--border-subtle); border-radius: 8px; height: 320px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .chat-bubble { font-size: 0.9rem; line-height: 1.5; max-width: 85%; }
        .bubble-user { color: var(--text-primary); align-self: flex-end; background: var(--chat-user-bg); padding: 10px 14px; border-radius: 12px 12px 2px 12px; }
        .bubble-gemini { color: var(--text-secondary); align-self: flex-start; background: var(--chat-gemini-bg); border: 1px solid var(--chat-gemini-border); padding: 12px 16px; border-radius: 12px 12px 12px 2px; }
        .bubble-gemini code { font-family: monospace; background: var(--code-bg); padding: 2px 6px; border-radius: 4px; color: #f43f5e; }
        .bubble-gemini pre { background: var(--pre-bg); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 10px 0; border: 1px solid var(--border-subtle); }
    </style>
    
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai"
        }
      }
    </script>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>Workspace Dashboard</h1>
                <p class="subtitle">Daily log sync pipeline</p>
            </div>
            <div>
                <button class="theme-toggle-btn" onclick="toggleDashboardTheme()">Theme: <span id="theme-status-lbl">Dark</span></button>
            </div>
        </header>

        <div class="top-row-container">
            <div class="panel">
                <h2>Daily Checklist</h2>
                <div class="control-row">
                    <input type="text" id="task-input-node" class="task-input" placeholder="Add structural tasks...">
                    <button class="deploy-btn" onclick="commitNewTask()">Add</button>
                </div>
                <ul class="checklist-container" id="checklist-render-node"></ul>
                <div class="metrics-footer">
                    <div>Active: <span id="active-count">0</span> | Resolved: <span id="complete-count">0</span></div>
                    <button class="purge-btn" onclick="purgeCompletedTasks()">Purge Resolved</button>
                </div>
            </div>

            <div class="panel">
                <h2>Gemini Assistant Console</h2>
                <div class="control-row"></div>
                <div class="ai-chat-log" id="ai-chat-viewport"></div>
                <div class="control-row" style="margin-bottom: 0;">
                    <input type="text" id="ai-query-input" class="task-input" placeholder="Query interface parameters...">
                    <button class="deploy-btn" id="ai-submit-btn" onclick="dispatchAiQuery()">Query</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { GoogleGenAI } from "@google/genai";

        // Firebase Sync Initialization
        const firebaseConfig = {
            apiKey: "AIzaSyACQZ-5RfnQg7gT1_V2PuxG4nA6uRm28uM",
            authDomain: "my-workspace-dashboard.firebaseapp.com",
            databaseURL: "https://my-workspace-dashboard-default-rtdb.firebaseio.com",
            projectId: "my-workspace-dashboard",
            storageBucket: "my-workspace-dashboard.firebasestorage.app",
            messagingSenderId: "584369640657",
            appId: "1:584369640657:web:160320fd21b1b4993ce1f0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataSyncRef = ref(db, 'dashboard/tasks'); // Matches active tree node path

        const TARGET_PIPELINE_KEY = 'AIzaSyAM5FFmnoIt6284nAky_30KAAQJB3sq36o';
        let aiClient = null;
        let activeChatSession = null;
        let datasetState = [];

        window.addEventListener('DOMContentLoaded', () => {
            initDashboardTheme();
            initializeAutomaticPipeline();
            
            // Core Cloud Realtime Listener
            onValue(dataSyncRef, (snapshot) => {
                datasetState = snapshot.val() || [];
                synchronizeChecklist();
            });
        });

        function initDashboardTheme() {
            const preservedTheme = localStorage.getItem('workspace_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', preservedTheme);
            document.getElementById('theme-status-lbl').textContent = preservedTheme.toUpperCase();
        }

        window.toggleDashboardTheme = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('workspace_theme', target);
            document.getElementById('theme-status-lbl').textContent = target.toUpperCase();
        }

        function parseMarkdown(text) {
            let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/^\s*[\-\*]\s+(.+)$/gm, '<li>$1</li>');
            if (html.includes('<li>')) html = html.replace(/((?:<li>.+<\/li>\s*)+)/g, '<ul>$1</ul>');
            return html.split('\n\n').map(p => p.trim().startsWith('<u') || p.trim().startsWith('<p') || p.trim().startsWith('<pre') ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
        }

        function initializeAutomaticPipeline() {
            const logViewport = document.getElementById('ai-chat-viewport');
            try {
                aiClient = new GoogleGenAI({ apiKey: TARGET_PIPELINE_KEY });
                activeChatSession = aiClient.chats.create({
                    model: 'gemini-2.5-flash',
                    config: { systemInstruction: "You are a concise engineering development terminal workspace assistant." }
                });
                logViewport.innerHTML = '<div class="chat-bubble bubble-gemini"><strong>[Console Pipeline Online]</strong></div>';
            } catch (err) {
                logViewport.innerHTML = `<div class="chat-bubble bubble-gemini" style="color:var(--accent-alert);">[Initialization Error]: ${err.message}</div>`;
            }
        }

        window.dispatchAiQuery = async function() {
            const queryInput = document.getElementById('ai-query-input');
            const logViewport = document.getElementById('ai-chat-viewport');
            const submitBtn = document.getElementById('ai-submit-btn');
            const rawText = queryInput.value.trim();
            if (!rawText || !activeChatSession) return;

            queryInput.disabled = true;
            submitBtn.disabled = true;

            const userBubble = document.createElement('div');
            userBubble.className = 'chat-bubble bubble-user';
            userBubble.textContent = rawText;
            logViewport.appendChild(userBubble);
            queryInput.value = '';

            const loadingBubble = document.createElement('div');
            loadingBubble.className = 'chat-bubble bubble-gemini';
            loadingBubble.innerHTML = '<em>Awaiting stream data...</em>';
            logViewport.appendChild(loadingBubble);
            logViewport.scrollTop = logViewport.scrollHeight;

            try {
                let response = await activeChatSession.sendMessage({ message: rawText });
                loadingBubble.innerHTML = parseMarkdown(response.text);
            } catch (err) {
                loadingBubble.innerHTML = `<span style="color:var(--accent-alert);">[Connectivity Error]: ${err.message}</span>`;
            }
            
            queryInput.disabled = false;
            submitBtn.disabled = false;
            queryInput.focus();
            logViewport.scrollTop = logViewport.scrollHeight;
        }

        function synchronizeChecklist() {
            const container = document.getElementById('checklist-render-node');
            if (!container) return;
            container.innerHTML = '';
            let remCount = 0, compCount = 0;

            if (datasetState.length === 0) {
                container.innerHTML = '<div class="empty-state">No pending actions items found.</div>';
            } else {
                datasetState.forEach((task, index) => {
                    task.completed ? compCount++ : remCount++;
                    const li = document.createElement('li');
                    li.className = 'checklist-item' + (task.completed ? ' resolved' : '');
                    li.innerHTML = `
                        <div class="task-left-block">
                            <span class="status-box">${task.completed ? '[X]' : '[ ]'}</span>
                            <span class="task-text">${task.text}</span>
                        </div>
                        <button class="clear-single-btn">Delete</button>
                    `;
                    
                    li.addEventListener('click', (e) => {
                        if (e.target.classList.contains('clear-single-btn')) return;
                        datasetState[index].completed = !datasetState[index].completed;
                        set(dataSyncRef, datasetState);
                    });

                    li.querySelector('.clear-single-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        datasetState.splice(index, 1);
                        set(dataSyncRef, datasetState);
                    });

                    container.appendChild(li);
                });
            }
            document.getElementById('active-count').textContent = remCount;
            document.getElementById('complete-count').textContent = compCount;
        }

        window.commitNewTask = function() {
            const inputNode = document.getElementById('task-input-node');
            const val = inputNode.value.trim();
            if (!val) return;
            datasetState.push({ text: val, completed: false });
            set(dataSyncRef, datasetState);
            inputNode.value = '';
            inputNode.focus();
        }

        window.purgeCompletedTasks = function() {
            datasetState = datasetState.filter(t => !t.completed);
            set(dataSyncRef, datasetState);
        }
    </script>
</body>
</html>
